name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
          config-file: .github/codeql/codeql-config.yml
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python
          output: sarif-results
          # Do not upload yet — filter vendored fixture paths, then upload-sarif below.
          upload: failure-only

      # Resolve artifact URIs (file:, index, uriBaseId) and drop vendored pipeline_code findings.
      # Glob-only SARIF filters can miss some locations; this covers Code Scanning + Code Quality.
      - name: Strip vendored pipeline_code findings from SARIF
        run: python3 .github/scripts/filter_vendored_pipeline_sarif.py sarif-results

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: /language:python
